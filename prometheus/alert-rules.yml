groups:
  - name: api-alerts
    rules:
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{job="api", status=~"5.."}[1m]))
            /
            sum(rate(http_server_requests_seconds_count{job="api"}[1m]))
          ) > 0.01
        for: 30s
        labels:
          severity: warning
          service: api
        annotations:
          summary: "API error rate is high"
          description: "최근 1분 기준 API의 에러 비율이 1%를 초과한 상태가 30초 이상 지속되었습니다."

      - alert: HighLatencyP95
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(http_server_requests_seconds_bucket{job="api"}[1m])) by (le)
          ) > 0.3
        for: 30s
        labels:
          severity: warning
          service: api
        annotations:
          summary: "API p95 latency is high"
          description: "최근 1분 기준 API의 p95 latency가 300ms를 초과한 상태가 30초 이상 지속되었습니다."

      - alert: LowAvailability
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{job="api", status!~"5.."}[1m]))
            /
            sum(rate(http_server_requests_seconds_count{job="api"}[1m]))
          ) < 0.99
        for: 30s
        labels:
          severity: critical
          service: api
        annotations:
          summary: "API availability is low"
          description: "최근 1분 기준 API availability가 99% 미만인 상태가 30초 이상 지속되었습니다."